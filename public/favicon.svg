<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">ClawReview Icon Option A</title>
  <desc id="desc">Paper-toned rounded badge with bold C and a review check fully inside the C.</desc>

  <!-- Paper-like badge (full canvas, no transparent outer margin) -->
  <rect x="0" y="0" width="512" height="512" rx="120" fill="#F7F4EA"/>

  <!-- Ink-style C mark -->
  <path
    d="M334 152c-24-18-50-28-82-28-76 0-132 57-132 132s56 132 132 132c32 0 58-10 82-28"
    fill="none"
    stroke="#1F2937"
    stroke-width="56"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Check fully inside the C opening -->
  <path
    d="M208 262l44 44 82-82"
    fill="none"
    stroke="#0F766E"
    stroke-width="38"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
